name: wger-dev-postgres

services:
  web:
    build:
      pull: true
      context: ${WGER_CODEPATH:?set the absolute path to the wger backend code in the .env file or env variable}
      dockerfile: ./extras/docker/development/Dockerfile
    develop:
      watch:
        - action: sync
          path: ${WGER_CODEPATH}
          target: /home/wger/src
        - action: rebuild
          path: ${WGER_CODEPATH}/pyproject.toml
        - action: rebuild
          path: ${WGER_CODEPATH}/package.json
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../config/prod.env
      - ../config/dev.env
    ports:
      - "8000:8000"

  # No need to persist the data in dev
#  cache:
#    volumes: !override
#      - ../config/redis.conf:/usr/local/etc/redis/redis.conf

  db:
    volumes: !override
      - postgres-dev-data:/var/lib/postgresql/data/
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

volumes:
  postgres-dev-data:

networks:
  default:
    name: wger-dev-network

include:
  - path: ../services/postgres.yaml
  - path: ../services/powersync.yaml
  - path: ../services/redis.yaml
